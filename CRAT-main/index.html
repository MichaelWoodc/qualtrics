<!DOCTYPE html>
<html>
<head>
    <title>CRA Task</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.2"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet">

    <style>
        body {
            background-color: #000;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #jspsych-target {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fixation {
            font-size: 100px;
            font-weight: bold;
            color: #e0e0e0;
            text-align: center;
        }

        .cra-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        .cra-words {
            font-size: 48px;
            line-height: 1.5;
            color: #f5f5f5;
            text-align: center;
            margin-bottom: 40px;
        }

        /* Answer input */
        .jspsych-survey-text-question input[type="text"] {
            width: 30vw;
            font-size: 32px;
            padding: 12px 16px;
            margin: 20px auto;
            display: block;
            background-color: #1e1e1e;
            color: #f5f5f5;
            border: 1px solid #444;
            border-radius: 2px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #1e88e5;
            box-shadow: 0 0 6px rgba(30,136,229,0.6);
        }

        /* Remove jsPsych's default content box constraints */
        .jspsych-content {
            max-width: none !important;
            width: 100vw !important;
            height: 100vh !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important; /* prevents scrollbars */
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }

    </style>
</head>

<body>
    <div id="jspsych-target"></div>
    <script src="cra_task.js"></script>
</body>
</html>
